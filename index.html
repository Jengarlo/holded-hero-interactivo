/* ── QR Code escaneable con estilo redondeado ───────────── */
function QRImg({ url, size }) {
  const ref = React.useRef();
  React.useEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = '';
    const qr = new QRCodeStyling({
      width: size,
      height: size,
      data: url,
      margin: 0,
      qrOptions: { errorCorrectionLevel: 'M' },
      dotsOptions:          { type: 'rounded',       color: '#111827' },
      cornersSquareOptions: { type: 'extra-rounded', color: '#111827' },
      cornersDotOptions:    { type: 'dot',           color: '#111827' },
      backgroundOptions:    { color: '#ffffff' },
    });
    qr.append(ref.current);
  }, [url, size]);
  return <div ref={ref} style={{width:size, height:size, lineHeight:0}} />;
}

            <button onClick={sendMsg} style={{
              width:32, height:32, borderRadius:6,
              background:accent, color:'white', fontSize:16, flexShrink:0,
            }}>›</button>
          </div>
        </>}

        {/* ═══════ HISTORIAL ═══════ */}
        {tab==='historial' && (() => {
          const items = [
            { action:'Factura creada',             user:'B. González', time:'29/03/2026 · 09:12' },
            { action:'Estado cambiado a Revisada', user:'M. García',   time:'31/03/2026 · 10:44' },
            { action:'Enviada por email',           user:'B. González', time:'31/03/2026 · 11:01' },
          ];
          return items.map((item,i) => (
            <div key={i} style={{display:'flex', gap:10, alignItems:'flex-start'}}>
              <div style={{display:'flex', flexDirection:'column', alignItems:'center', flexShrink:0, alignSelf:'stretch'}}>
                <div style={{
                  width:18, height:18, borderRadius:9, background:'#eff6ff', flexShrink:0,
                  display:'flex', alignItems:'center', justifyContent:'center',
                }}>
                  <div style={{width:6, height:6, borderRadius:3, background:'#1963ef'}} />
                </div>
                {i < items.length-1 &&
                  <div style={{width:1, flex:1, background:'#e5e7eb', marginTop:3}} />}
              </div>
              <div style={{paddingBottom: i < items.length-1 ? 10 : 0}}>
                <p style={{fontSize:10, fontWeight:600, color:'#374151', lineHeight:'16px'}}>{item.action}</p>
                <p style={{fontSize:9, color:'#9ca3af', marginTop:2}}>{item.user} · {item.time}</p>
              </div>
            </div>
          ));
        })()}

      </div>{/* end content */}

      {/* ── BOTÓN ENVIAR ── */}
      <div style={{
        padding:'14px 30px',
        borderTop:'1px solid #e5e7eb',
        flexShrink:0,
      }}>
        <button className="enviar-btn" style={{
          width:'100%', padding:'10px 20px',
          background:'#1963ef', color:'white',
          borderRadius:4, fontSize:12, fontWeight:600,
          display:'flex', alignItems:'center', justifyContent:'center', gap:6,
        }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Enviar
        </button>
      </div>
    </div>
  );
}

   APP ROOT
───────────────────────────────────────────────────────── */

      padding:'60px 40px', overflow:'auto',
      position:'relative',
    }}>
      {/* Glow sutil */}
      <div style={{
        position:'absolute', pointerEvents:'none',

        top:'50%', left:'50%', transform:'translate(-50%,-50%)',

      <div style={{position:'relative'}}>
        {/* Verifactu badge */}
        <img src={A.verifactu} alt="Verifactu Software Certificado"
          style={{
            position:'absolute', top:-59, right:-54,

        {/* ─── LA CARD ─── */}
        <div style={{
          display:'flex',
          width:1215, height:600,
          background:'white',

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
