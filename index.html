<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holded — Hero</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.js"></script>
  <style>
    @font-face {
      font-family: 'Font Awesome 7 Pro';
      font-weight: 400;
      font-style: normal;
      src: url('https://raw.githubusercontent.com/Jengarlo/holded-hero-interactivo/main/fonts/fa7-pro-regular.otf') format('opentype');
    }
    @font-face {
      font-family: 'Font Awesome 7 Pro';
      font-weight: 900;
      font-style: normal;
      src: url('https://raw.githubusercontent.com/Jengarlo/holded-hero-interactivo/main/fonts/fa7-pro-solid.otf') format('opentype');
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .panel-scroll::-webkit-scrollbar { width: 3px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
    .nav-btn { transition: background .12s; }
    .nav-btn:hover { background: rgba(255,255,255,.07) !important; }
    .tab-pill { transition: background .12s, color .12s; }
    .swatch-sq { transition: transform .12s; border: none; padding: 0; }
    .swatch-sq:hover { transform: scale(1.2); }
    .aprobar-btn { transition: color .12s; }
    .aprobar-btn:hover { color: #1448c8 !important; }
    .enviar-btn { transition: opacity .15s, transform .1s; }
    .enviar-btn:hover { opacity: .88; }
    .enviar-btn:hover svg { fill: white; }
    .enviar-btn:active { transform: scale(.98); }
    .add-line-btn { transition: color .12s; }
    .msg-bubble { transition: background .12s; cursor: default; }
    .msg-bubble:hover { background: #f0f1f3 !important; }
    .hist-row { border-radius: 6px; transition: background .12s; cursor: default; }
    .hist-row:hover { background: #f3f4f6; }
    .mockup-scale { transform-origin: top center; }
    @media (max-width: 1350px) { .mockup-scale { transform: scale(0.82); } }
    @media (max-width: 1100px) { .mockup-scale { transform: scale(0.68); } }
    @media (max-width: 900px)  { .mockup-scale { transform: scale(0.55); } }
    @media (max-width: 700px)  { .mockup-scale { transform: scale(0.43); } }
    @media (max-width: 500px)  { .mockup-scale { transform: scale(0.31); } }
    @media (max-width: 400px)  { .mockup-scale { transform: scale(0.25); } }
    .msg-input:focus { border-color: #1963ef !important; outline: none; }
    .verifactu-wrap { position: relative; display: inline-block; cursor: pointer; transition: transform .3s ease; }
    .verifactu-wrap:hover { transform: scale(1.05); }
    .verifactu-shine {
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.62) 50%, transparent);
      transform: skewX(-15deg);
      pointer-events: none;
      opacity: 0;
    }
    .verifactu-wrap:hover .verifactu-shine {
      animation: destello 1.2s ease forwards;
    }
    @keyframes destello {
      0%   { left: -70%; opacity: 0; }
      10%  { opacity: 1; }
      100% { left: 130%; opacity: 0.5; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ── Figma assets ──────────────────────────────────────── */
const A = {
  diamond:  "https://www.figma.com/api/mcp/asset/37f252ff-bb3e-482f-8491-dba747618207",
  avatar:   "https://www.figma.com/api/mcp/asset/a3d34512-7c3f-4fb3-914f-cee516508a20",
  group:    "https://www.figma.com/api/mcp/asset/456f4523-ff1f-4cc7-afe1-313688d78ffa",
  qr:       "https://www.figma.com/api/mcp/asset/524870ad-6051-4279-a59b-d870b73fb6ec",
  check:    "https://www.figma.com/api/mcp/asset/f9a360f0-e056-40a0-b95a-f68de37a22ae",
  dot:      "https://www.figma.com/api/mcp/asset/78ab2833-1c3c-43d5-8d93-80b7af529aa7",
  brandDot: "https://www.figma.com/api/mcp/asset/11bebaac-8986-4543-bbf6-d6ee86afaf96",
  verifactu:"https://www.figma.com/api/mcp/asset/92317a70-5310-479b-9b0c-c7270b87d003",
  onlineDot:"https://www.figma.com/api/mcp/asset/724cbe14-c2b1-4cce-b447-90995947087c",
};

/* Swatches exactos del Figma */
const SWATCHES = ['#7C5CFC','#0891B2','#16A34A','#EA580C','#1E293B'];

/* Hex → rgba helper para el logo de la factura */
const hexRgba = (hex, a) => {
  const [r,g,b] = [1,3,5].map(i => parseInt(hex.slice(i,i+2),16));
  return `rgba(${r},${g},${b},${a})`;
};

/* Nav items exactos del Figma (6225:196) — FA7 Pro Regular unicode */
const NAV = [
  { u:'\uf015', label:'Inicio'       },
  { u:'\ue0e3', label:'Ventas',  active:true },
  { u:'\uf543', label:'Compras'      },
  { u:'\uf5fd', label:'Inventario'   },
  { u:'\uf19c', label:'Tesorería'    },
  { u:'\ue0e4', label:'Contabilidad' },
  { u:'\uf56c', label:'Impuestos'    },
  { u:'\ue473', label:'Analítica'    },
];

/* ── QR Code escaneable con estilo redondeado ───────────── */
function QRImg({ url, size }) {
  const ref = React.useRef();
  React.useEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = '';
    const qr = new QRCodeStyling({
      width: size,
      height: size,
      type: 'svg',
      data: url,
      margin: 0,
      qrOptions: { errorCorrectionLevel: 'M' },
      dotsOptions:          { type: 'rounded',       color: '#111827' },
      cornersSquareOptions: { type: 'extra-rounded', color: '#111827' },
      cornersDotOptions:    { type: 'dot',           color: '#111827' },
      backgroundOptions:    { color: '#ffffff' },
    });
    qr.append(ref.current);
  }, [url, size]);
  return <div ref={ref} style={{width:size, height:size, lineHeight:0}} />;
}

/* ─────────────────────────────────────────────────────────
   SIDEBAR  (62 × 600, #1f2937)
───────────────────────────────────────────────────────── */
function Sidebar() {
  return (
    <div style={{
      width:62, flexShrink:0, minHeight:600,
      background:'#1f2937',
      borderRight:'0.9px solid #4b5563',
      display:'flex', flexDirection:'column',
      alignItems:'center',
      paddingTop:20,
    }}>
      {/* Holded logo mark */}
      <img src={A.diamond} alt="Holded"
        style={{width:16.184, height:14.133, display:'block', marginBottom:20, filter:'brightness(0) invert(1)' }} />

      {/* Separator */}
      <div style={{width:'100%', height:'0.9px', background:'#374151', marginBottom:10}} />

      {/* Nav — hover only, no click */}
      <div style={{
        display:'flex', flexDirection:'column',
        gap:10, padding:'0 15px', flex:1, alignItems:'stretch',
      }}>
        {NAV.map((n,i) => (
          <div key={i} title={n.label}
            className="nav-btn"
            style={{
              display:'flex', alignItems:'center', justifyContent:'center',
              width:'100%', height:28, padding:'7.64px',
              borderRadius:6, cursor:'default',
              background: i===1 ? '#374151' : 'transparent',
              color:       i===1 ? '#f3f4f6' : '#9ca3af',
              fontSize:13,
            }}>
            <span style={{fontFamily:'"Font Awesome 7 Pro"', fontWeight:400, fontSize:14, lineHeight:1, display:'block'}}>{n.u}</span>
          </div>
        ))}
      </div>

      {/* Separator */}
      <div style={{width:'100%', height:'0.9px', background:'#374151', marginTop:10}} />

      {/* Avatar */}
      <div style={{paddingTop:20, paddingBottom:20}}>
        <div style={{
          width:28, height:28, borderRadius:'50%',
          background:'#f3f0ff',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>
          <span style={{fontFamily:'Inter', fontWeight:700, fontSize:13, color:'#7c5cfc', lineHeight:1}}>B</span>
        </div>
      </div>
    </div>
  );
}

const fmt = n => {
  const s = n.toFixed(2);
  return (s.endsWith('.00') ? String(Math.round(n)) : s.replace('.',',')) + ' €';
};

/* ─────────────────────────────────────────────────────────
   INVOICE CARD  (664 × 576) — flex layout, líneas dinámicas
───────────────────────────────────────────────────────── */
function InvoiceCard({ accent, onTotalChange }) {
  const P = 30, W = 664;

  const [lines, setLines] = React.useState([
    { id:1, name:'Diseño web',  desc:'Landing page corporativa + responsive.',     qty:1, price:1100 },
    { id:2, name:'Branding',    desc:'Logotipo, paleta de colores y guía de marca.', qty:1, price:546  },
  ]);

  const [focusedId, setFocusedId] = React.useState(null);
  const [hoveredId, setHoveredId] = React.useState(null);
  const removeLine = (id) => setLines(l => l.filter(ln => ln.id !== id));

  const addLine    = () => setLines(l => [...l, { id:Date.now(), name:'Nuevo concepto', desc:'', qty:1, price:0 }]);
  const updateLine = (id, field, val) => setLines(l => l.map(ln =>
    ln.id === id ? { ...ln, [field]: (field==='qty'||field==='price') ? (parseFloat(val)||0) : val } : ln
  ));

  const subtotal = lines.reduce((s,l) => s + l.qty * l.price, 0);
  const iva      = subtotal * 0.21;
  const total    = subtotal + iva;

  React.useEffect(() => { onTotalChange && onTotalChange(total); }, [total]);

  const D = () => <div style={{height:1, background:'#f3f4f6', marginLeft:P, marginRight:P}} />;

  return (
    <div style={{
      margin:'20px 63px 20px 49px',
      width:W, minHeight:640,
      background:'white', border:'1px solid #e5e7eb',
      borderRadius:4, boxShadow:'0px 2px 6px 0px rgba(0,0,0,0.07)',
      display:'flex', flexDirection:'column',
    }}>

      {/* ── HEADER — padding P=30 en los 4 lados ── */}
      <div style={{flexShrink:0, position:'relative', width:W,
        display:'flex', alignItems:'center', padding:P, paddingBottom:P}}>
        <div style={{position:'absolute', bottom:0, left:P, right:P, height:1, background:'#f3f4f6'}} />
        {/* Logo + texto en flex, altura fija igual al logo box */}
        <div style={{display:'flex', alignItems:'flex-start', gap:10, height:44, flexShrink:0}}>
          <div style={{width:44, height:44, flexShrink:0, background:accent, borderRadius:10,
            display:'flex', alignItems:'center', justifyContent:'center'}}>
            <img src={A.group} alt="" style={{width:25.658, height:26.131, display:'block', filter:'brightness(0) invert(1)'}} />
          </div>
          <div style={{display:'flex', flexDirection:'column', justifyContent:'space-between', height:44}}>
            <div style={{fontSize:13, fontWeight:700, color:'#111827', lineHeight:1}}>Solar Tech S.A</div>
            <div>
              <div style={{fontSize:10, fontWeight:500, color:'#9ca3af', lineHeight:'13px'}}>Passeig de Gràcia, 78</div>
              <div style={{fontSize:10, fontWeight:500, color:'#9ca3af', lineHeight:'13px'}}>08008 Barcelona</div>
            </div>
          </div>
        </div>
        {/* QR alineado a la derecha */}
        <div style={{flexShrink:0, width:76, height:76, overflow:'hidden', marginLeft:'auto'}}>
          <QRImg url="https://www.holded.com/es/programa-facturacion-verifactu" size={76} />
        </div>
      </div>

      {/* ── CLIENTE + TOTAL ── */}
      <div style={{flexShrink:0, position:'relative', padding:`16px ${P}px`}}>
        <div style={{position:'absolute', bottom:0, left:P, right:P, height:1, background:'#f3f4f6'}} />
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            <div style={{fontSize:9, fontWeight:700, color:'#9ca3af', letterSpacing:'0.06em'}}>CLIENTE</div>
            <div style={{fontSize:14, fontWeight:600, color:'#374151'}}>Proyecto Volta S.L.</div>
            <div style={{fontSize:10, fontWeight:500, color:'#9ca3af'}}>08027 Barcelona</div>
            <div style={{fontSize:10, fontWeight:500, color:'#9ca3af'}}>12345678A</div>
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:6, alignItems:'flex-end'}}>
            <div style={{fontSize:9, fontWeight:700, color:'#9ca3af', letterSpacing:'0.06em'}}>TOTAL</div>
            <div style={{fontSize:22, fontWeight:700, color:'#111827'}}>{fmt(total)}</div>
          </div>
        </div>
      </div>

      {/* ── CABECERAS COLUMNAS (37px) ── */}
      <div style={{flexShrink:0, position:'relative', height:37}}>
        <div style={{position:'absolute', bottom:0, left:P, right:P, height:1, background:'#f3f4f6'}} />
        <div style={{position:'absolute', left:P,   top:14, fontSize:9, fontWeight:700, color:'#9ca3af', letterSpacing:'0.06em'}}>DESCRIPCIÓN</div>
        <div style={{position:'absolute', right:216, top:14, fontSize:9, fontWeight:700, color:'#9ca3af', letterSpacing:'0.06em', textAlign:'right'}}>CANTIDAD</div>
        <div style={{position:'absolute', right:113, top:14, fontSize:9, fontWeight:700, color:'#9ca3af', letterSpacing:'0.06em', textAlign:'right'}}>PRECIO</div>
        <div style={{position:'absolute', right:P,   top:14, fontSize:9, fontWeight:700, color:'#9ca3af', letterSpacing:'0.06em', textAlign:'right'}}>TOTAL</div>
      </div>

      {/* ── LÍNEAS (scrollable) ── */}
      <div style={{flexShrink:0}}>
        {lines.map((line) => {
          const isNew = line.id > 2;
          const inpStyle = (extra) => ({
            position:'absolute', background:'transparent', border:'none', outline:'none',
            fontFamily:'inherit', padding:0, ...extra,
          });
          return (
            <React.Fragment key={line.id}>
              <div
                onMouseEnter={() => isNew && setHoveredId(line.id)}
                onMouseLeave={() => isNew && setHoveredId(null)}
                onFocus={() => isNew && setFocusedId(line.id)}
                onBlur={() => isNew && setFocusedId(null)}
                style={{
                  position:'relative', height:52,
                  background: (isNew && focusedId === line.id) ? hexRgba(accent, 0.10) : 'transparent',
                }}>
                {isNew
                  ? <input value={line.name} onChange={e=>updateLine(line.id,'name',e.target.value)}
                      style={inpStyle({left:P, top:19, width:290, fontSize:13, fontWeight:600, color:'#1f2937'})} />
                  : <div style={{position:'absolute', left:P, top:10, fontSize:13, fontWeight:600, color:'#1f2937', lineHeight:'13px'}}>{line.name}</div>
                }
                {!isNew && <div style={{position:'absolute', left:P, top:28, fontSize:11, fontWeight:400, color:'#9ca3af', lineHeight:'13px'}}>{line.desc}</div>}
                {isNew
                  ? <input type="number" min="0" value={line.qty||''} placeholder="0" onChange={e=>updateLine(line.id,'qty',e.target.value)}
                      style={inpStyle({right:186, top:19, width:70, fontSize:13, fontWeight:400, color:'#374151', textAlign:'right'})} />
                  : <div style={{position:'absolute', right:216, top:15, fontSize:13, fontWeight:400, color:'#374151', textAlign:'right', width:60}}>{line.qty} uds.</div>
                }
                {isNew
                  ? <input type="number" min="0" value={line.price||''} placeholder="0" onChange={e=>updateLine(line.id,'price',e.target.value)}
                      style={inpStyle({right:83, top:19, width:80, fontSize:13, fontWeight:400, color:'#374151', textAlign:'right'})} />
                  : <div style={{position:'absolute', right:113, top:15, fontSize:13, fontWeight:400, color:'#374151', textAlign:'right', width:80}}>{line.price > 0 ? fmt(line.price) : '—'}</div>
                }
                <div style={{position:'absolute', right:P, top: isNew ? 19 : 15, fontSize:13, fontWeight:600,
                  color:'#1f2937', textAlign:'right'}}>
                  {line.qty*line.price > 0 ? fmt(line.qty*line.price) : '—'}
                </div>
                {isNew && hoveredId === line.id && (
                  <button
                    onMouseDown={e => { e.preventDefault(); removeLine(line.id); }}
                    style={{
                      position:'absolute', right:P, top:'50%', transform:'translateY(-50%)',
                      width:20, height:20, borderRadius:'50%',
                      background:'#fee2e2', color:'#ef4444',
                      fontSize:14, lineHeight:1,
                      display:'flex', alignItems:'center', justifyContent:'center',
                      flexShrink:0, zIndex:2,
                    }}>×</button>
                )}
              </div>
              <D />
            </React.Fragment>
          );
        })}
        {(() => {
          const [hov, setHov] = React.useState(false);
          const c = hov ? hexRgba(accent, 0.5) : accent;
          return (
            <button className="add-line-btn" onClick={addLine}
              onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
              style={{display:'flex', alignItems:'center', gap:6, color:c, fontSize:11, fontWeight:500, background:'transparent', padding:`10px ${P}px`, height:38}}>
              <svg width="10" height="10" viewBox="0 0 10 10">
                <line x1="5" y1="0" x2="5" y2="10" stroke={c} strokeWidth="1.5"/>
                <line x1="0" y1="5" x2="10" y2="5" stroke={c} strokeWidth="1.5"/>
              </svg>
              Añadir línea
            </button>
          );
        })()}
      </div>

      {/* ── FOOTER ── */}
      <div style={{flexShrink:0, padding:`${P}px`}}>
        <div style={{height:1, background:'#f3f4f6', marginBottom:P}} />
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:16}}>
          <div>
            <div style={{fontSize:11, fontWeight:600, color:'#6b7280', marginBottom:6}}>Información y detalles de pago</div>
            <div style={{fontSize:11, fontWeight:400, color:'#9ca3af'}}>Pago por transferencia bancaria</div>
          </div>
          <div style={{minWidth:194}}>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:5}}>
              <span style={{fontSize:10, fontWeight:500, color:'#9ca3af'}}>SUBTOTAL</span>
              <span style={{fontSize:12, fontWeight:400, color:'#6b7280'}}>{fmt(subtotal)}</span>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
              <span style={{fontSize:10, fontWeight:500, color:'#9ca3af'}}>IVA (21%)</span>
              <span style={{fontSize:12, fontWeight:400, color:'#6b7280'}}>{fmt(iva)}</span>
            </div>
            <div style={{height:1, background:'#f3f4f6', marginBottom:8}} />
            <div style={{display:'flex', justifyContent:'space-between'}}>
              <span style={{fontSize:12, fontWeight:700, color:'#111827'}}>TOTAL</span>
              <span style={{fontSize:13, fontWeight:700, color:'#111827'}}>{fmt(total)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   RIGHT PANEL  (377 × 600)
   padding: 34px top/bottom, 30px left/right | gap: 18px
───────────────────────────────────────────────────────── */
function RightPanel({ accent, onAccentChange, invoiceTotal }) {
  const [tab,      setTab]      = useState('general');
  const [approved, setApproved] = useState(false);
  const [msgs,     setMsgs]     = useState([
    { initials:'MG', color:'#0891b2', name:'M. García',
      time:'31/03/2026 · 10:45', text:'Factura revisada y aprobada. Todo correcto.' },
  ]);
  const [msgInput, setMsgInput] = useState('');

  const sendMsg = () => {
    if (!msgInput.trim()) return;
    setMsgs(p => [...p, {
      initials:'B', color:'#7c5cfc', name:'Tú', time:'ahora', text:msgInput.trim()
    }]);
    setMsgInput('');
  };

  /* Divider a ancho completo (compensa el padding de 30px) */
  const HR = () => (
    <div style={{height:1, background:'#d1d5db', flexShrink:0}} />
  );

  const SecTitle = ({children}) => (
    <div style={{fontSize:12, fontWeight:600, color:'#111827', marginBottom:10}}>{children}</div>
  );

  return (
    <div style={{
      width:377, flexShrink:0, minHeight:600, alignSelf:'flex-start', position:'sticky', top:0,
      background:'white', borderLeft:'1px solid #d1d5db',
      display:'flex', flexDirection:'column',
    }}>

      {/* ── TABS (pill style exacto de Figma) ── */}
      <div style={{
        display:'flex', flexDirection:'column',
        padding:'20px 30px 0',
        flexShrink:0,
      }}>
        <div style={{display:'flex', gap:6, paddingBottom:16}}>
        {[['general','General'],['mensajes','Mensajes'],['historial','Historial']].map(([id,lbl]) => (
          <button key={id} onClick={() => setTab(id)}
            className="tab-pill"
            style={{
              flex:1,
              height:34,
              fontSize:12, fontWeight:600,
              color:       tab===id ? 'white'   : '#111827',
              background:  tab===id ? '#111827' : '#e5e7eb',
              borderRadius:6,
            }}>
            {lbl}
          </button>
        ))}
        </div>
        <div style={{height:1, background:'#d1d5db'}} />
      </div>

      {/* ── CONTENT ── */}
      <div className="panel-scroll"
        style={{
          flex:1, overflowY:'auto',
          padding:'16px 30px',
          display:'flex', flexDirection:'column', gap:18,
        }}>

        {/* ═══════ GENERAL ═══════ */}
        {tab==='general' && <>

          {/* Filas de metadatos */}
          <div style={{display:'flex', flexDirection:'column', gap:10}}>
            {[
              ['Total',            fmt(invoiceTotal)],
              ['Num de documento', 'F260001'  ],
              ['Cliente',          'Proyecto Volta S.L.'],
              ['Fecha',            '29/03/2026'],
            ].map(([k,v]) => (
              <div key={k} style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <span style={{fontSize:11, fontWeight:500, color:'#9ca3af'}}>{k}</span>
                <span style={{fontSize:11, fontWeight:600, color:'#111827'}}>{v}</span>
              </div>
            ))}
          </div>

          <HR/>

          {/* Badge verde — Revisada */}
          <div style={{
            background:'#ecfdf5', borderRadius:6,
            padding:12,
            display:'flex', alignItems:'center', gap:12,
          }}>
            <img src={A.check} alt="" style={{width:20, height:20, flexShrink:0, display:'block'}} />
            <div>
              <p style={{fontSize:11, fontWeight:600, color:'#166534', lineHeight:'13px'}}>
                Revisada por tu asesor
              </p>
              <p style={{fontSize:11, fontWeight:500, color:'#111827', marginTop:4, lineHeight:'13px'}}>
                M. García · 31/03/2026
              </p>
            </div>
          </div>

          <HR/>

          {/* Estado Borrador + Aprobar */}
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            {approved ? (
              <div style={{
                display:'inline-flex', alignItems:'center', gap:4,
                background:'#ebfbf5', borderRadius:6, padding:'4px 9px',
              }}>
                <img src="https://www.figma.com/api/mcp/asset/8d2a9d83-a7ea-4a61-8560-786a6ff92801" alt="" style={{width:8, height:8, display:'block'}} />
                <span style={{fontSize:11, fontWeight:600, color:'#1b8751', lineHeight:'12px'}}>Aprobada</span>
              </div>
            ) : (
              <div style={{
                display:'inline-flex', alignItems:'center', gap:4,
                background:'#f3f4f6', borderRadius:6, padding:'4px 9px',
              }}>
                <img src={A.dot} alt="" style={{width:8, height:8, display:'block'}} />
                <span style={{fontSize:11, fontWeight:600, color:'#111827', lineHeight:'12px'}}>Borrador</span>
              </div>
            )}
            {!approved && (
              <button className="aprobar-btn"
                onClick={() => setApproved(true)}
                style={{fontSize:11, fontWeight:600, color:'#1963ef', padding:0}}>
                Aprobar
              </button>
            )}
          </div>

          <HR/>

          {/* Categorización */}
          <div>
            <SecTitle>Categorización</SecTitle>
            <div style={{
              display:'flex', justifyContent:'space-between', alignItems:'center',
              padding:'4px 0',
            }}>
              <span style={{fontSize:11, fontWeight:500, color:'#9ca3af'}}>Cuenta contable</span>
              <div style={{
                display:'inline-flex', alignItems:'center', gap:4,
                background:'#f3f4f6', borderRadius:6, padding:'4px 9px',
              }}>
                <img src={A.brandDot} alt="" style={{width:6, height:6, display:'block'}} />
                <span style={{fontSize:10, fontWeight:600, color:'#111827'}}>Prestación de servicios</span>
              </div>
            </div>
          </div>

          <HR/>

          {/* Tema color */}
          <div>
            <SecTitle>Tema color</SecTitle>
            <div style={{display:'flex', alignItems:'center', gap:6}}>
              {SWATCHES.map(c => (
                <button key={c} onClick={() => onAccentChange(c)}
                  className="swatch-sq"
                  style={{
                    width:18, height:18, borderRadius:4,
                    background:c, flexShrink:0,
                    outline:  accent===c ? '2px solid rgba(209,213,219,0.8)' : 'none',
                    outlineOffset: 1,
                  }} />
              ))}
              <button style={{
                width:38, height:18, borderRadius:4,
                background:'#f3f4f6', fontSize:11, fontWeight:500, color:'#9ca3af',
              }}>+100</button>
            </div>
          </div>
        </>}

        {/* ═══════ MENSAJES ═══════ */}
        {tab==='mensajes' && <>
          {msgs.map((m,i) => (
            <div key={i} style={{display:'flex', gap:8, alignItems:'flex-start'}}>
              <div style={{
                width:26, height:26, borderRadius:13, background:m.color, flexShrink:0,
                display:'flex', alignItems:'center', justifyContent:'center',
              }}>
                <span style={{fontSize:9, fontWeight:700, color:'white'}}>{m.initials}</span>
              </div>
              <div className="msg-bubble" style={{background:'#f9fafb', borderRadius:6, padding:'8px 10px', flex:1}}>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:3}}>
                  <span style={{fontSize:11, fontWeight:600, color:'#374151'}}>{m.name}</span>
                  <span style={{fontSize:9, color:'#9ca3af'}}>{m.time}</span>
                </div>
                <p style={{fontSize:11, color:'#6b7280', lineHeight:'16px'}}>{m.text}</p>
              </div>
            </div>
          ))}
          <div style={{display:'flex', gap:6}}>
            <input
              className="msg-input"
              value={msgInput}
              onChange={e => setMsgInput(e.target.value)}
              onKeyDown={e => { if (e.key==='Enter') sendMsg(); }}
              placeholder="Escribe un mensaje…"
              style={{
                flex:1, border:'1px solid #e5e7eb', borderRadius:6,
                padding:'7px 10px', fontSize:11, color:'#374151',
              }}
            />
            <button onClick={sendMsg} style={{
              width:32, height:32, borderRadius:6,
              background:'#1963ef', color:'white', fontSize:16, flexShrink:0,
            }}>›</button>
          </div>
        </>}

        {/* ═══════ HISTORIAL ═══════ */}
        {tab==='historial' && (() => {
          const items = [
            { action:'Factura creada',             user:'B. González', time:'29/03/2026 · 09:12' },
            { action:'Estado cambiado a Revisada', user:'M. García',   time:'31/03/2026 · 10:44' },
            { action:'Enviada por email',           user:'B. González', time:'31/03/2026 · 11:01' },
          ];
          return items.map((item,i) => (
            <div key={i} className="hist-row" style={{display:'flex', gap:10, alignItems:'flex-start', padding:'4px 6px', margin:'0 -6px'}}>
              <div style={{display:'flex', flexDirection:'column', alignItems:'center', flexShrink:0, alignSelf:'stretch'}}>
                <div style={{
                  width:18, height:18, borderRadius:9, background:'#eff6ff', flexShrink:0,
                  display:'flex', alignItems:'center', justifyContent:'center',
                }}>
                  <div style={{width:6, height:6, borderRadius:3, background:'#1963ef'}} />
                </div>
                {i < items.length-1 &&
                  <div style={{width:1, flex:1, background:'#e5e7eb', marginTop:3}} />}
              </div>
              <div style={{paddingBottom: i < items.length-1 ? 10 : 0}}>
                <p style={{fontSize:11, fontWeight:600, color:'#374151', lineHeight:'16px'}}>{item.action}</p>
                <p style={{fontSize:9, color:'#9ca3af', marginTop:2}}>{item.user} · {item.time}</p>
              </div>
            </div>
          ));
        })()}

      </div>{/* end content */}

      {/* ── BOTÓN ENVIAR ── */}
      <div style={{
        padding:'0 30px 20px',
        flexShrink:0,
      }}>
        <div style={{height:1, background:'#e5e7eb', marginBottom:16}} />
        <button className="enviar-btn" style={{
          width:'100%', padding:'10px 20px',
          background: '#1963ef', color:'white',
          borderRadius:6, fontSize:12, fontWeight:600,
          display:'flex', alignItems:'center', justifyContent:'center', gap:6,
        }}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Enviar
        </button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   APP ROOT
───────────────────────────────────────────────────────── */
function App() {
  const [accent, setAccent] = useState('#7C5CFC');
  const [invoiceTotal, setInvoiceTotal] = useState(1991.66);
  return (
    <div style={{
      minHeight:'100vh', background:'#0a0a0a',
      display:'flex', alignItems:'center', justifyContent:'center',
      padding:'60px 40px', overflow:'auto',
      position:'relative',
    }}>
      {/* Glow sutil */}
      <div style={{
        position:'absolute', pointerEvents:'none',
        width:1000, height:500,
        background:'radial-gradient(ellipse, rgba(124,92,252,.09) 0%, transparent 65%)',
        top:'50%', left:'50%', transform:'translate(-50%,-50%)',
      }} />

      <div className="mockup-scale" style={{position:'relative'}}>
        {/* Verifactu badge */}
        <div className="verifactu-wrap" style={{position:'absolute', top:-59, right:-54, width:112, height:112, zIndex:10}}>
          <img src={A.verifactu} alt="Verifactu Software Certificado"
            style={{width:112, height:112, display:'block'}} />
          {/* clip interior al círculo visual del badge — inset ~6px */}
          <div style={{position:'absolute', inset:6, borderRadius:'50%', overflow:'hidden', pointerEvents:'none'}}>
            <div className="verifactu-shine" style={{position:'absolute', top:'-10%', left:'-70%', width:'45%', height:'120%'}} />
          </div>
        </div>

        {/* ─── LA CARD ─── */}
        <div style={{
          display:'flex',
          width:1215, height:600,
          background:'white',
          border:'1px solid rgba(255,255,255,0.08)',
          borderRadius:'16px 16px 0 0',
          boxShadow:'0px 25px 50px -12px rgba(0,0,0,0.5)',
          overflow:'hidden',
        }}>
          <Sidebar />

          {/* Área principal — fondo gris con invoice card dentro */}
          <div style={{
            width:776, background:'#f9fafb',
            flexShrink:0,
          }}>
            <InvoiceCard accent={accent} onTotalChange={setInvoiceTotal} />
          </div>

          <RightPanel accent={accent} onAccentChange={setAccent} invoiceTotal={invoiceTotal} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
